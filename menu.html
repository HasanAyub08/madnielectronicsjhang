<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — The Hot Spot Cafe & Restaurant | Jhang</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #e74c3c;
      --secondary: #f39c12;
      --bg-dark: #0a0a0f;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-dark);
      color: #eee;
      overflow-x: hidden;
    }
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-track { background: var(--bg-dark); }
    body::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    /* HEADER */
    .menu-header {
      text-align: center;
      padding: 3rem 5% 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .menu-header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      color: #fff;
    }
    .menu-header h1 span {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .menu-header p {
      color: rgba(255,255,255,0.4);
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 1rem;
      transition: 0.3s;
    }
    .back-link:hover { color: #fff; }

    /* TABS */
    .menu-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 1.5rem 5%;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .menu-tab {
      padding: 0.5rem 1.2rem;
      border: 1px solid rgba(231, 76, 60, 0.2);
      background: rgba(255,255,255,0.02);
      color: rgba(255,255,255,0.5);
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .menu-tab:hover {
      border-color: rgba(231, 76, 60, 0.4);
      color: #fff;
    }
    .menu-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 25px rgba(231, 76, 60, 0.2);
    }

    /* SECTION */
    .menu-section {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 5% 4rem;
    }
    .menu-category {
      display: none;
    }
    .menu-category.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cat-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(231, 76, 60, 0.15);
    }
    .cat-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .cat-header span { font-size: 1.3rem; }
    .cat-header .count {
      margin-left: auto;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }

    .menu-item {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      padding: 0.7rem 1rem;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      border-left: 2px solid transparent;
      transition: all 0.3s ease;
      margin-bottom: 0.5rem;
    }
    .menu-item:hover {
      background: rgba(231, 76, 60, 0.05);
      border-left-color: var(--primary);
    }
    .menu-item .name { flex: 1; font-weight: 500; font-size: 0.9rem; color: #ddd; }
    .menu-item .dots {
      flex: 1;
      min-width: 20px;
      margin: 0 0.8rem;
      border-bottom: 1px dotted rgba(255,255,255,0.1);
    }
    .menu-item .price { font-weight: 700; color: var(--primary); font-size: 0.9rem; white-space: nowrap; }
    .menu-item .desc { width: 100%; font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 0.3rem; }
    .menu-item.birthday {
      border-left-color: gold !important;
      background: rgba(255, 215, 0, 0.04) !important;
    }
    .menu-item.birthday .name { color: gold; }

    /* FOOTER */
    .menu-footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .menu-footer a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .menu-footer a:hover { color: #fff; }
  </style>
</head>
<body>

<div class="menu-header">
  <h1>Our <span>Full Menu</span></h1>
  <p>A universe of flavours — pick your slice</p>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
</div>

<div class="menu-tabs" id="menuTabs">
  <button class="menu-tab active" data-cat="traditional">🔥 Traditional</button>
  <button class="menu-tab" data-cat="special">⭐ Special</button>
  <button class="menu-tab" data-cat="fried">🍟 Fried & Baked</button>
  <button class="menu-tab" data-cat="platters">🍽️ Platters</button>
  <button class="menu-tab" data-cat="pasta">🍝 Pasta</button>
  <button class="menu-tab" data-cat="sandwich">🥪 Sandwiches</button>
  <button class="menu-tab" data-cat="broast">🍗 Broast</button>
  <button class="menu-tab" data-cat="burgers">🍔 Burgers</button>
  <button class="menu-tab" data-cat="shawarma">🌯 Shawarma</button>
  <button class="menu-tab" data-cat="paratha">🫓 Paratha</button>
  <button class="menu-tab" data-cat="deals">🏆 Deals</button>
</div>

<div class="menu-section" id="menuSection"></div>

<div class="menu-footer">
  <a href="index.html">← Back to The Hot Spot</a>
</div>

<script>
  const menuData = {
    traditional: { icon: '🔥', name: 'Traditional Pizzas', items: [
      ['Chicken Supreme', 'Rs 550'], ['The Hotspot Special', 'Rs 620'], ['Chicken Tandoori', 'Rs 500'], ['Cheezy Cheese', 'Rs 450'], ['Chicken Tikka', 'Rs 550'], ['Chicken Fajita', 'Rs 550'], ['Chicken Chapli', 'Rs 550'], ['Veggie Lover', 'Rs 450'], ['Chicken Achari', 'Rs 580'], ['BBQ Spicy', 'Rs 599'], ['Extra Toppings', 'Rs 60']
    ]},
    special: { icon: '⭐', name: 'Special Pizzas', items: [
      ['Super Supreme', 'Rs 620'], ['Special Mughlai', 'Rs 650'], ['Special Malai Boti', 'Rs 640'], ['Special BonFire', 'Rs 620'], ['Special Lazania', 'Rs 1,250'], ['BBQ Spicy', 'Rs 599'], ['Stuffed Crust', 'Rs 1,199'], ['Crown Crust', 'Rs 1,199'], ['Behari Kabab', 'Rs 1,199'], ['Double Chicken Cheese Stuffer', 'Rs 1,250'], ['Kababish Pizza', 'Rs 600'], ['Donut Pizza', 'Rs 800'], ['Layar Blast Pizza', 'Rs 1,200'], ['4 In 1 Pizza', 'Rs 1,499']
    ]},
    fried: { icon: '🍟', name: 'Fried & Baked', items: [
      ['Hotspot Special Loaded Fries', 'Rs 300'], ['French Fries', 'Rs 150'], ['Oven Baked Wings', 'Rs 400'], ['Crispy Hot Wings', 'Rs 400'], ['Nuggets', 'Rs 250'], ['Matka Fries', 'Rs 450']
    ]},
    platters: { icon: '🍽️', name: 'Hotspot Platters', items: [
      ['Hotspot Special Platter', 'Rs 800'], ['Hotspot Special Roll', 'Rs 700'], ['Spin Roll', 'Rs 550'], ['Bihari Roll', 'Rs 500'], ['Cheese Sticks', 'Rs 750'], ['Grill Roll', 'Rs 650'], ['Chilli Milli Roll', 'Rs 600']
    ]},
    pasta: { icon: '🍝', name: 'Tasty Pasta Range', items: [
      ['HS Special Pasta', 'Rs 450'], ['Tandoori Pasta', 'Rs 699'], ['Malai Boti Pasta', 'Rs 450'], ['Flaming Pasta', 'Rs 350'], ['Crunchy Pasta', 'Rs 450']
    ]},
    sandwich: { icon: '🥪', name: 'Sandwiches & Wraps', items: [
      ['Hotspot Special Sandwich', 'Rs 700'], ['Hotspot Special Wrap', 'Rs 550'], ['Chicken Wrap', 'Rs 450'], ['Crunch Wrap', 'Rs 500'], ['Grill Wrap', 'Rs 530'], ['Grill Sandwich', 'Rs 750'], ['Chicken Sandwich', 'Rs 450'], ['Pocket Sandwich', 'Rs 430']
    ]},
    broast: { icon: '🍗', name: 'Chicken Broast', items: [
      ['Quarter', 'Rs 750', '2 Pcs Chicken, Cold Drink 345 ml, Regular Fries, 1 Dip Sauce, 1 Pc Mighty Bread'],
      ['Half', 'Rs 1,150', '4 Pcs Chicken, Cold Drink 500 ml, Regular Fries, 2 Dip Sauce, 2 Pcs Mighty Bread'],
      ['Full', 'Rs 1,950', '8 Pcs Chicken, Cold Drink 1L, Regular Fries, 3 Dip Sauce, 2 Pcs Mighty Bread']
    ]},
    burgers: { icon: '🍔', name: 'Burgers', items: [
      ['HS Special Burger', 'Rs 500'], ['Chhapi Burger', 'Rs 260'], ['Zinger Burger', 'Rs 380'], ['Grill Burger', 'Rs 530'], ['Double Flavour Burger', 'Rs 480'], ['Double Chapli Burger', 'Rs 500'], ['Tower Burger', 'Rs 540'], ['Patty Burger', 'Rs 270']
    ]},
    shawarma: { icon: '🌯', name: 'Shawarma', items: [
      ['HS Special Shawarma', 'Rs 320'], ['Chicken Shawarma', 'Rs 230'], ['Chicken Achari Shawarma', 'Rs 320'], ['Chicken Zinger Shawarma', 'Rs 380'], ['Arabian Shawarma', 'Rs 230'], ['Kabab Shawarma', 'Rs 330'], ['Tikka Boti Shawarma', 'Rs 300'], ['Dip Sauce', 'Rs 70']
    ]},
    paratha: { icon: '🫓', name: 'Paratha Roll', items: [
      ['Chicken Paratha', 'Rs 299'], ['Achari Paratha', 'Rs 299'], ['Zinger Paratha', 'Rs 350'], ['Tikka Paratha', 'Rs 360'], ['Kabab Paratha', 'Rs 380']
    ]},
    deals: { icon: '🏆', name: 'Hotspot Special Deals', items: [
      ['Deal 1', 'Rs 850', '5 Hot Wings, Cold Drink 500ml, 5 Over-baked Wings'],
      ['Deal 2', 'Rs 850', '1 Small Pizza, 1 Chapli Burger, 500 ml Cold Drink'],
      ['Deal 3', 'Rs 1,199', '4 Patty Burgers, Cold Drink 1 L'],
      ['Deal 4', 'Rs 1,650', '4 Zinger Burgers, Regular Fries, Cold Drink 1L'],
      ['Deal 5', 'Rs 1,650', '3 Chapli Burgers, 2 Zinger Burgers, Cold Drink 1.5 L'],
      ['Deal 6', 'Rs 1,499', '1 Medium Pizza, 1 Chapli / Patty Burger, Cold Drink 1L'],
      ['Deal 7', 'Rs 2,050', '1 Tandoori Pizza, 1 Large Pasta, Cold Drink 1.5 Liter'],
      ['Deal 8', 'Rs 1,899', '2 Medium Pizzas, Cold Drink 1.5 Liter'],
      ['🎂 Birthday Deal', 'Rs 4,899', '1 Pound Cake, 1 Extra Large Pizza, 10 Oven Baked Wings, 10 Crispy Hot Wings, 1 Family French Fries, 10 Nuggets, 2 Cold Drink 1.5 Liter']
    ]}
  };

  let currentCat = 'traditional';
  const section = document.getElementById('menuSection');

  function renderCategory(cat) {
    const data = menuData[cat];
    if (!data) return;
    currentCat = cat;

    let html = `<div class="cat-header"><span>${data.icon}</span><h2>${data.name}</h2><span class="count">${data.items.length} items</span></div><div class="menu-items">`;
    data.items.forEach(item => {
      const isBirthday = item[0].includes('Birthday');
      html += `<div class="menu-item${isBirthday ? ' birthday' : ''}"><span class="name">${item[0]}</span><span class="dots"></span><span class="price">${item[1]}</span>`;
      if (item[2]) html += `<span class="desc">${item[2]}</span>`;
      html += `</div>`;
    });
    html += `</div>`;
    section.innerHTML = html;
  }

  renderCategory('traditional');

  document.querySelectorAll('.menu-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const cat = tab.dataset.cat;
      if (cat !== currentCat) {
        document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        section.innerHTML = '<div style="text-align:center;padding:3rem;color:rgba(255,255,255,0.2);font-size:0.9rem;"><div style="font-size:3rem;margin-bottom:1rem;opacity:0.3;">🍕</div>Loading...</div>';
        setTimeout(() => renderCategory(cat), 200);
      }
    });
  });
</script>
</body>
</html>
